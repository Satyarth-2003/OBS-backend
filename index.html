<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Adda247 OBS Relay Service</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <script type="module" src="/analytics.js"></script>
  <style>
    :root {
      --bg-color: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.7);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --accent: #38bdf8;
      --glow: rgba(56, 189, 248, 0.4);
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* Animated Background Gradient */
    .bg-animation {
      position: absolute;
      width: 150vw;
      height: 150vh;
      background: radial-gradient(circle at 50% 50%, rgba(56, 189, 248, 0.15), transparent 60%),
                  radial-gradient(circle at 80% 20%, rgba(139, 92, 246, 0.15), transparent 50%);
      animation: pulse 15s ease-in-out infinite alternate;
      z-index: 0;
    }

    @keyframes pulse {
      0% { transform: scale(1) translate(0, 0); }
      100% { transform: scale(1.1) translate(-2%, 5%); }
    }

    .container {
      position: relative;
      z-index: 1;
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      padding: 3rem 4rem;
      text-align: center;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 40px var(--glow);
      animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
      transform: translateY(30px);
    }

    @keyframes slideUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .status-ring {
      position: relative;
      width: 80px;
      height: 80px;
      margin: 0 auto 2rem;
      border-radius: 50%;
      background: rgba(16, 185, 129, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .status-ring::before {
      content: '';
      position: absolute;
      inset: -5px;
      border-radius: 50%;
      background: conic-gradient(from 0deg, transparent, #10b981, transparent);
      animation: spin 3s linear infinite;
    }

    .status-ring::after {
      content: '';
      position: absolute;
      inset: 2px;
      background: var(--bg-color);
      border-radius: 50%;
    }

    .status-dot {
      position: relative;
      z-index: 2;
      width: 20px;
      height: 20px;
      background: #10b981;
      border-radius: 50%;
      box-shadow: 0 0 20px #10b981, 0 0 40px #10b981;
      animation: breathe 2s ease-in-out infinite alternate;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes breathe {
      0% { transform: scale(0.9); opacity: 0.8; }
      100% { transform: scale(1.2); opacity: 1; }
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
      background: linear-gradient(to right, #ffffff, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.02em;
    }

    p {
      font-size: 1.1rem;
      color: var(--text-muted);
      max-width: 350px;
      margin: 0 auto;
      line-height: 1.5;
    }

    .badge {
      display: inline-block;
      margin-top: 2rem;
      padding: 0.5rem 1rem;
      border-radius: 9999px;
      background: rgba(56, 189, 248, 0.1);
      border: 1px solid rgba(56, 189, 248, 0.3);
      color: var(--accent);
      font-size: 0.875rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      transition: all 0.3s ease;
    }

    .badge:hover {
      background: rgba(56, 189, 248, 0.2);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(56, 189, 248, 0.2);
    }
  </style>
</head>
<body>
  <div class="bg-animation"></div>
  <div class="container">
    <div class="status-ring">
      <div class="status-dot"></div>
    </div>
    <h1>Service Active</h1>
    <p>The OBS Relay Backend is online and actively processing pairing requests.</p>
    <div class="badge">Vercel Serverless &middot; Redis Connected</div>
  </div>
</body>
</html>
